      --line-height-h1: 1.00;

<script>
    class VideoSlider extends HTMLElement {
        constructor() {
            super();

        }
        connectedCallback() {

            const videoSlider = new Swiper(this.querySelector('.video-swiper-container'), {
                slidesPerView: 4,
                spaceBetween: 12,
                loop: false,
                speed:1000,
                breakpoints: {
                    0: {
                     slidesPerView: 1.65,
                    },
                    500: {
                        slidesPerView: 2.5,
                    },
                    870: {
                        slidesPerView: 4,
                    }
                }
            });


            this.videoPlay();

        }

        videoPlay(){
            this.querySelectorAll('.videbox-play-btn').forEach(item=>{
                const video = item.parentNode.querySelector('video');

                        item.addEventListener('click', (e) => {
                    
                            if( !e.currentTarget.classList.contains('play') ){
                                e.currentTarget.classList.add('play')
                                video.play();
                                video.muted = true;
                                video.setAttribute("controls", "controls");
                                video.classList.remove('pause');
                            }

                            video.addEventListener('pause', () => {
                                item.classList.remove('play');
                                video.classList.add('pause');
                                video.removeAttribute("controls");
                            });


                            video.addEventListener('play', () => {
                                item.classList.add('play');
                                video.classList.remove('pause');
                                video.setAttribute("controls", "controls");
                            });
                            
                            
                        })
                    })
                    
        }
    }


    document.addEventListener("DOMContentLoaded", function() {
        
        if (!customElements.get('video-slider')) {
        customElements.define('video-slider', VideoSlider);
        }
    }) 

    document.addEventListener('shopify:section:load', () => {
        if (!customElements.get('video-slider')) {
        customElements.define('video-slider', VideoSlider);
        }
    })



</script>
